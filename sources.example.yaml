# 复制为 sources.yaml 并按环境修改 path。
# Docker 推荐使用 /sources/<id>，由 docker-compose 卷挂载。
# 本机直跑 API 时可改为绝对路径，例如 D:/notes/knowledge_engineering

sources:
  - id: knowledge_engineering
    type: local
    path: "/sources/knowledge_engineering"
    include:
      - "**/*.md"
      - "**/*.py"
      - "**/*.java"

  - id: JavaBasic
    type: local
    path: "/sources/JavaBasic"
    include:
      - "**/*.md"
      - "**/*.java"

  - id: PythonBasic
    type: local
    path: "/sources/PythonBasic"
    include:
      - "**/*.md"
      - "**/*.py"

  - id: wiki
    type: local
    path: "/data/wiki"
    include:
      - "**/*.md"

  # 占位：远程源尚未实现
  # - id: example_github
  #   type: github
  #   url: "https://github.com/org/repo"
  #   include: ["**/*.md"]
