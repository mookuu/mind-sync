# 复制为 sources.yaml 并按环境修改 path。
# Docker 推荐使用 /sources/<id>，由 docker-compose 卷挂载。
# order：默认同步顺序（越小越先）；Web 设置可覆盖 sync_source_order。

sources:
  - id: knowledge_engineering
    type: local
    order: 10
    path: "/sources/knowledge_engineering"
    include:
      - "**/*.md"
      - "**/*.py"
      - "**/*.java"

  # Obsidian Web Clipper 导出目录
  # 本地路径示例：/home/moku/data/mind-sync-data/obsidian
  - id: obsidian
    type: local
    order: 20
    path: "/sources/obsidian"
    include:
      - "**/*.md"

  - id: JavaBasic
    type: local
    order: 30
    path: "/sources/JavaBasic"
    include:
      - "**/*.md"
      - "**/*.java"

  # 同源：优先 GitHub pull，失败回退下方 local
  - id: PythonBasic
    type: github
    order: 45
    path: "/sources/PythonBasic"
    url: "https://github.com/you/PythonBasic.git"
    branch: main
    include:
      - "**/*.md"
      - "**/*.py"

  - id: PythonBasic
    type: local
    order: 40
    path: "/sources/PythonBasic"
    include:
      - "**/*.md"
      - "**/*.py"

  # 需替换 url；私有仓配置 GITHUB_TOKEN
  - id: example_github
    type: github
    order: 50
    path: "/sources/example_github"
    url: "https://github.com/you/your-notes.git"
    branch: main
    include:
      - "**/*.md"
      - "**/*.py"

  # Web 源：见 .env WEB_FETCH_* 与 fetch_confirmed
  # 占位示例，启用时替换 url 并将 fetch_confirmed 设为 true
  - id: example_web
    type: web
    order: 60
    url: "https://example.com"
    fetch_confirmed: false
    path: "/sources/web_snapshots/example_web"
    include:
      - "**/*.md"

  # Wiki 知识库
  # 本地路径示例：/home/moku/data/mind-sync-data/wiki
  - id: wiki
    type: local
    order: 100
    path: "/data/wiki"
    include:
      - "**/*.md"
