# 复制为 sources.yaml 并按环境修改 path。
# Docker 推荐使用 /sources/<id>，由 docker-compose 卷挂载。
# 本机直跑 API 时可改为绝对路径，例如 D:/notes/knowledge_engineering

sources:
  - id: knowledge_engineering
    type: local
    path: "/sources/knowledge_engineering"
    include:
      - "**/*.md"
      - "**/*.py"
      - "**/*.java"

  - id: JavaBasic
    type: local
    path: "/sources/JavaBasic"
    include:
      - "**/*.md"
      - "**/*.java"

  - id: PythonBasic
    type: local
    path: "/sources/PythonBasic"
    include:
      - "**/*.md"
      - "**/*.py"

  - id: wiki
    type: local
    path: "/data/wiki"
    include:
      - "**/*.md"

  # GitHub 源：同步时 shallow clone 到 data/repos/<id>（需 GITHUB_TOKEN 访问私有仓）
  # - id: example_github
  #   type: github
  #   url: "https://github.com/you/your-notes.git"
  #   branch: main
  #   paths: ["docs/", "notes/"]
  #   include: ["**/*.md", "**/*.py"]

  # Web 源：抓取 URL 快照到 data/web-cache/<id>/index.md
