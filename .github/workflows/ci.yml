name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATA_DIR: ./.ci-data

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests
        run: pytest -q
      - name: Dependency audit
        run: pip-audit -r apps/api/requirements.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Web markdown-it bundle smoke test
        run: |
          cd apps/web
          npm install --no-audit --no-fund
          npm run build:vendor
          npm run test:markdown
      - name: Smoke API (uvicorn)
        env:
          AUTH_PASSWORD: ci-smoke-pass
          API_KEY: ci-smoke-api-key
          SECRET_KEY: ci-smoke-secret-key-not-default
        run: |
          uvicorn app.main:app --app-dir apps/api --host 127.0.0.1 --port 8000 &
          PID=$!
          sleep 5
          python scripts/smoke_all.py --base-url http://127.0.0.1:8000 --password ci-smoke-pass --skip-sync
          kill $PID
