services:
  api:
    build: ./apps/api
    container_name: mind-sync-api
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
      - DATA_ROOT=/data
      - SOURCES_FILE=${SOURCES_FILE:-/workspace/sources.yaml}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - API_KEY=${API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - VAULT_GIT_URL=${VAULT_GIT_URL:-}
      - VAULT_GIT_BRANCH=${VAULT_GIT_BRANCH:-main}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
    volumes:
      - ${DATA_ROOT:-/home/moku/data/mind-sync-data}:/data
      - ./sources.yaml:/workspace/sources.yaml
      - ./apps/api/app:/app/app
      # 通配映射：用户可添加 /home/moku/ 下任意路径作为素材
      - /home/moku:/home/moku:ro
      # 默认共享库
      - ${SOURCE_OBSIDIAN:-./sources/obsidian}:/sources/obsidian:ro
      - ${SOURCE_WEB_SNAPSHOTS:-./sources/web_snapshots}:/sources/web_snapshots
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build: ./apps/web-new
    container_name: mind-sync-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
