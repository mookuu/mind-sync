# Docker 容器内路径
# 默认共享库（由 Docker volume 映射提供）
# 自定义源通过 Web UI 「素材管理」添加，写入 user_sources.yaml

# 所有路径均为服务器（Docker 宿主机）绝对路径
# 容器通过卷映射可访问：
#   /home/moku:/home/moku:ro    → 用户自定义源
#   ./data:/data                → wiki、DB 等
#   ./sources/obsidian → /sources/obsidian（向后兼容）

sources:
  - id: obsidian
    type: local
    order: 20
    path: "/home/moku/projects/mind-sync/sources/obsidian"
    include:
      - "**/*.md"

  - id: example_web
    type: web
    order: 60
    url: "https://example.com"
    fetch_confirmed: true
    path: "/home/moku/projects/mind-sync/sources/web_snapshots/example_web"
    include:
      - "**/*.md"

  - id: wiki
    type: local
    order: 100
    path: "/home/moku/data/mind-sync-data/wiki"
    include:
      - "**/*.md"
