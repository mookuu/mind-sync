sources:
  - id: obsidian
    type: local
    order: 20
    path: ~/data/mind-sync-data/obsidian
    include:
      - "**/*.md"
    shared: true
  - id: wiki
    type: local
    order: 100
    path: ~/data/mind-sync-data/wiki
    include:
      - "**/*.md"
    shared: true
  - id: web_snapshots
    type: local
    order: 80
    path: ~/data/mind-sync-data/web_snapshots
    include:
      - "**/*.md"
    shared: true
  - id: example_web
    type: web
    order: 60
    url: https://example.com
    fetch_confirmed: false
    path: ~/data/mind-sync-data/web_snapshots/example_web
    include:
      - "**/*.md"
